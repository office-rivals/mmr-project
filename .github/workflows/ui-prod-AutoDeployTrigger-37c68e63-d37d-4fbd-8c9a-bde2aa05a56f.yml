name: Trigger auto deployment for ui-prod

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/ui-prod-AutoDeployTrigger-37c68e63-d37d-4fbd-8c9a-bde2aa05a56f.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.UIPROD_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.UIPROD_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.UIPROD_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          registryUrl: 
          registryUsername: ${{ secrets.UIPROD_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.UIPROD_REGISTRY_PASSWORD }}
          containerAppName: ui-prod
          resourceGroup: rg-mmr
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


